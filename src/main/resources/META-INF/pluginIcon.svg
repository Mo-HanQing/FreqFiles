<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background circle with gradient -->
    <circle cx="20" cy="20" r="18" fill="url(#bgGradient)"/>
    
    <!-- File icon -->
    <path d="M12 10C12 9.44772 12.4477 9 13 9H18.5858C18.851 9 19.1054 9.10536 19.2929 9.29289L23.7071 13.7071C23.8946 13.8946 24 14.149 24 14.4142V26C24 26.5523 23.5523 27 23 27H13C12.4477 27 12 26.5523 12 26V10Z" 
          fill="white" fill-opacity="0.9"/>
    
    <!-- Frequency chart bars on the file -->
    <rect x="14" y="18" width="2" height="4" fill="url(#barGradient1)" rx="0.5"/>
    <rect x="17" y="16" width="2" height="6" fill="url(#barGradient2)" rx="0.5"/>
    <rect x="20" y="14" width="2" height="8" fill="url(#barGradient3)" rx="0.5"/>
    <rect x="23" y="17" width="2" height="5" fill="url(#barGradient4)" rx="0.5"/>
    
    <!-- Small star/star icon for favorite -->
    <path d="M28 14L28.618 16.618L31.236 17.236L28.618 17.854L28 20.472L27.382 17.854L24.764 17.236L27.382 16.618L28 14Z" 
          fill="url(#starGradient)" opacity="0.9"/>
    
    <!-- Gradients -->
    <defs>
        <!-- Background gradient -->
        <linearGradient id="bgGradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4A90E2"/>
            <stop offset="50%" stop-color="#5B9BD5"/>
            <stop offset="100%" stop-color="#6B57FF"/>
        </linearGradient>
        
        <!-- Chart bar gradients -->
        <linearGradient id="barGradient1" x1="14" y1="18" x2="16" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3BEA62"/>
            <stop offset="100%" stop-color="#2ECC71"/>
        </linearGradient>
        
        <linearGradient id="barGradient2" x1="17" y1="16" x2="19" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3498DB"/>
            <stop offset="100%" stop-color="#2980B9"/>
        </linearGradient>
        
        <linearGradient id="barGradient3" x1="20" y1="14" x2="22" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#9B59B6"/>
            <stop offset="100%" stop-color="#8E44AD"/>
        </linearGradient>
        
        <linearGradient id="barGradient4" x1="23" y1="17" x2="25" y2="22" gradientUnits="userSpaceOnUse">
